name: Publish Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (optional)"
        required: false
        type: string
      release_notes:
        description: "Optional release notes override"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Restore Android signing key
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_B64:-}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] || [ -z "${ANDROID_KEY_ALIAS:-}" ] || [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "Signing secrets are not configured. Falling back to Gradle release signing defaults."
            exit 0
          fi
          mkdir -p signing
          printf '%s' "$ANDROID_KEYSTORE_B64" | base64 -d > signing/mohamy-release.jks
          chmod 600 signing/mohamy-release.jks
          {
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/signing/mohamy-release.jks"
            echo "STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Resolve release metadata
        id: meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          VERSION_CODE=$(grep -E 'versionCode = [0-9]+' app/build.gradle.kts | head -n1 | sed -E 's/.*versionCode = ([0-9]+).*/\1/')
          VERSION_NAME=$(grep -E 'versionName = "[^"]+"' app/build.gradle.kts | head -n1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')

          RELEASE_TAG="${INPUT_RELEASE_TAG:-}"
          if [ -z "$RELEASE_TAG" ]; then
            if [ "${REF_TYPE:-}" = "tag" ] && [ -n "${REF_NAME:-}" ]; then
              RELEASE_TAG="$REF_NAME"
            else
              RELEASE_TAG="v${VERSION_NAME}"
            fi
          fi

          if [ -n "${INPUT_RELEASE_NOTES:-}" ]; then
            RELEASE_NOTES="${INPUT_RELEASE_NOTES}"
          else
            PREV_TAG="$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)"
            if [ -n "$PREV_TAG" ]; then
              RELEASE_NOTES="$(git log --pretty=format:'- %s' "${PREV_TAG}..HEAD" | head -n 12)"
            else
              RELEASE_NOTES="$(git log --pretty=format:'- %s' -n 12 HEAD)"
            fi
          fi

          if [ -z "${RELEASE_NOTES:-}" ]; then
            RELEASE_NOTES="- تحسينات عامة وإصلاحات."
          fi

          APK_URL="https://github.com/${REPOSITORY}/releases/download/${RELEASE_TAG}/app-release.apk"
          RELEASE_PAGE_URL="https://github.com/${REPOSITORY}/releases/tag/${RELEASE_TAG}"

          export VERSION_CODE VERSION_NAME RELEASE_TAG APK_URL RELEASE_PAGE_URL RELEASE_NOTES
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version_code = int(os.environ["VERSION_CODE"])
          version_name = os.environ["VERSION_NAME"]
          release_tag = os.environ["RELEASE_TAG"]
          apk_url = os.environ["APK_URL"]
          release_page_url = os.environ["RELEASE_PAGE_URL"]
          release_notes = os.environ["RELEASE_NOTES"].strip()

          Path("release-notes.md").write_text(
              f"# Mohamy Phone {version_name}\n\n"
              f"Tag: `{release_tag}`\n\n"
              f"{release_notes}\n",
              encoding="utf-8",
          )

          path = Path("update/latest.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["versionCode"] = version_code
          data["versionName"] = version_name
          data["title"] = f"Mohamy Phone {version_name}"
          data["notes"] = release_notes
          data["apkUrl"] = apk_url
          data["releasePageUrl"] = release_page_url
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          {
            echo "version_code=$VERSION_CODE"
            echo "version_name=$VERSION_NAME"
            echo "release_tag=$RELEASE_TAG"
            echo "apk_url=$APK_URL"
            echo "release_page_url=$RELEASE_PAGE_URL"
          } >> "$GITHUB_OUTPUT"

          {
            echo "VERSION_CODE=$VERSION_CODE"
            echo "VERSION_NAME=$VERSION_NAME"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "APK_URL=$APK_URL"
            echo "RELEASE_PAGE_URL=$RELEASE_PAGE_URL"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Release APK not found at $APK_PATH"
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH" --clobber
            gh release edit "$RELEASE_TAG" --title "Mohamy Phone $VERSION_NAME" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" "$APK_PATH" --title "Mohamy Phone $VERSION_NAME" --notes-file release-notes.md
          fi

      - name: Update latest manifest on main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version_code = int(os.environ["VERSION_CODE"])
          version_name = os.environ["VERSION_NAME"]
          release_tag = os.environ["RELEASE_TAG"]
          apk_url = os.environ["APK_URL"]
          release_page_url = os.environ["RELEASE_PAGE_URL"]
          release_notes = Path("release-notes.md").read_text(encoding="utf-8").strip()

          path = Path("update/latest.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["versionCode"] = version_code
          data["versionName"] = version_name
          data["title"] = f"Mohamy Phone {version_name}"
          data["notes"] = release_notes
          data["apkUrl"] = apk_url
          data["releasePageUrl"] = release_page_url
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

          git add update/latest.json
          if git diff --cached --quiet; then
            echo "No latest.json changes to commit."
          else
            git commit -m "Update release manifest for $RELEASE_TAG"
            git push origin HEAD:main
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mohamy-release-${{ steps.meta.outputs.release_tag }}
          path: |
            app/build/outputs/apk/release/app-release.apk
            update/latest.json
            release-notes.md
          if-no-files-found: error
